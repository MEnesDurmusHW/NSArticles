:root {
  color-scheme: light;
  --bg: #FAF7F2;

}
[data-theme="dark"] {

  --surface: #161920;
  --text: #e8e6e1;

  --text-muted: #555a66;

  --accent-glow: rgba(196, 149, 106, 0.08);
  --divider: rgba(255, 255, 255, 0.1);
  --border: rgba(255, 255, 255, 0.06);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {

  font-family: var(--sans);

}
.grain {
  position: fixed;

  pointer-events: none;
  z-index: 100;
  opacity: 0;
}
[data-theme="dark"] .grain { opacity: 1; }
.theme-toggle,
.share-toggle,
.home-toggle {
  position: fixed;
  top: 20px;
  z-index: 999;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
}
.theme-toggle { right: 20px; }
.share-toggle { right: 70px; }
.home-toggle {
  left: 20px;
  text-decoration: none;
  color: var(--accent);
}
.home-toggle svg { width: 28px; height: 28px; display: block; }
.theme-toggle:hover,
.share-toggle:hover { border-color: var(--accent); color: var(--accent); }
.home-toggle:hover { border-color: var(--accent); background: var(--accent); color: var(--bg); }
.theme-toggle svg,
.share-toggle svg { width: 18px; height: 18px; }
.theme-toggle .icon-sun { display: none; }
.theme-toggle .icon-moon { display: block; }
[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
[data-theme="dark"] .theme-toggle .icon-moon { display: none; }
.home-logo {

}
.home-logo:hover .logo-text { color: var(--accent); }
