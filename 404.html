<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Sayfa Bulunamadı</title>
<script src="theme.js"></script>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .content {
    text-align: center;
    max-width: 400px;
  }

  .four04 {
    font-family: var(--serif);
    font-size: clamp(80px, 18vw, 140px);
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -2px;
    margin-bottom: 24px;
    opacity: 0.25;
  }

  .content h1 {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    margin: 0 0 16px;
    line-height: 1.3;
  }
  .content h1 em {
    color: var(--accent);
    font-style: italic;
  }

  .content .desc {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.8;
    margin: 0 0 20px;
  }

  .content .aside {
    font-size: 13.5px;
    color: var(--text-muted);
    font-style: italic;
    margin: 0 auto 32px;
    padding: 12px 20px;
    border-left: 2px solid var(--accent);
    text-align: left;
    line-height: 1.7;
    max-width: 320px;
  }

  .home-btn {
    display: inline-block;
    padding: 10px 28px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 6px;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    letter-spacing: 0.3px;
    transition: all 0.3s ease;
  }
  .home-btn:hover {
    background: var(--accent);
    color: var(--bg);
    transform: translateY(-1px);
  }
</style>
</head>
<body>

<div class="grain"></div>
<button class="theme-toggle" onclick="toggleTheme()" aria-label="Tema değiştir">
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
</button>

<div class="wrapper">
  <div class="content">
    <div class="four04">404</div>
    <h1>Bu sayfa <em>kayıp.</em></h1>
    <p class="desc">Muhtemelen yanlış bir adrestesiniz. Ya da sayfa duvar örüp sessizce çekildi.</p>
    <div class="aside">Gottman'a göre sorunların %69'u zaten çözümsüz. Bu da onlardan biriydi.</div>
    <a href="index.html" class="home-btn">Ana Sayfaya Dön</a>
  </div>
</div>

<a href="index.html" class="home-logo"><span class="logo-text">NS Articles</span><span class="logo-author">by M. Enes Durmuş</span></a>

</body>
