<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Sayfa Bulunamadı</title>
<script src="theme.js"></script>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 24px;
  }

  .four04 {
    font-family: var(--serif);
    font-size: clamp(100px, 20vw, 180px);
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    opacity: 0.15;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -65%);
    user-select: none;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    max-width: 460px;
  }

  .content h1 {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.3;
  }
  .content h1 em {
    color: var(--accent);
    font-style: italic;
  }

  .content p {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.75;
    margin-bottom: 12px;
  }

  .content .punch {
    font-size: 14px;
    color: var(--text-muted);
    font-style: italic;
    margin: 24px 0 32px;
    padding: 16px 20px;
    border-left: 2px solid var(--accent);
    text-align: left;
    line-height: 1.7;
  }

  .home-btn {
    display: inline-block;
    padding: 12px 32px;
    background: var(--accent-glow);
    border: 1px solid var(--divider);
    border-radius: 8px;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .home-btn:hover {
    background: var(--accent);
    color: var(--bg);
    transform: translateY(-1px);
  }

  .home-logo {
    position: fixed;
    bottom: 24px;
  }
</style>
</head>
<body>

<div class="grain"></div>
<button class="theme-toggle" onclick="toggleTheme()" aria-label="Tema değiştir">
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
</button>

<div class="four04">404</div>

<div class="content">
  <h1>Bu sayfa <em>kayıp.</em></h1>
  <p>Muhtemelen yanlış bir adrese geldiniz. Ya da bu sayfa hiç var olmadı — tıpkı "bu sefer erken yatacağım" dediğimiz geceler gibi.</p>
  <div class="punch">Bir ihtimal de sayfa vardı ve gitti. Böyle şeyler oluyor. Önemli olan yas sürecini sağlıklı atlatmak.</div>
  <a href="index.html" class="home-btn">Ana Sayfaya Dön</a>
</div>

<a href="index.html" class="home-logo"><span class="logo-text">NS Articles</span><span class="logo-author">by M. Enes Durmuş</span></a>

</body>
</html>
